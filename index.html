<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>YesTeachers — Effortless Prep. Endless Impact.</title>
  <style>
    :root {
      --green: #1e9b75;
      --dark: #0a0a0a;
      --text: #ffffff;
      --muted: #aaaaaa;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: 'Arial', system-ui, sans-serif;
      background: var(--dark);
      color: var(--text);
      overflow: hidden;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    .container {
      width: 1080px;
      height: 1080px;
      position: relative;
      overflow: hidden;
      box-shadow: 0 0 80px rgba(30, 155, 117, 0.3);
    }

    /* Progress Bar */
    .progress-container {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 8px;
      background: #222;
      z-index: 100;
    }
    .progress {
      height: 100%;
      width: 0%;
      background: var(--green);
      transition: width 30s linear;
    }

    /* Section 1 - Hook */
    .pill {
      position: absolute;
      top: 218px;
      left: 350px;
      width: 380px;
      height: 44px;
      background: var(--green);
      border-radius: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transform: scale(0);
      font-size: 18px;
      font-weight: bold;
      color: white;
      z-index: 10;
    }

    .headline1 {
      position: absolute;
      top: 330px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 86px;
      font-weight: 800;
      text-align: center;
      opacity: 0;
      white-space: nowrap;
    }

    .headline2 {
      position: absolute;
      top: 432px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 86px;
      font-weight: 800;
      color: var(--green);
      text-align: center;
      opacity: 0;
      white-space: nowrap;
    }

    .subtitle {
      position: absolute;
      top: 592px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 30px;
      color: var(--muted);
      text-align: center;
      max-width: 800px;
      opacity: 0;
    }

    /* Animation classes */
    .animate-in {
      animation: popIn 0.8s forwards;
    }

    .slide-up {
      animation: slideUp 0.9s forwards;
    }

    @keyframes popIn {
      0% { opacity: 0; transform: scale(0.3); }
      100% { opacity: 1; transform: scale(1); }
    }

    @keyframes slideUp {
      0% { opacity: 0; transform: translateY(60px); }
      100% { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="container" id="videoContainer">

    <!-- Green Pill -->
    <div class="pill" id="pill">
      Smart tools built for teachers.
    </div>

    <!-- Headline 1 -->
    <div class="headline1" id="headline1">Your prep is</div>

    <!-- Headline 2 -->
    <div class="headline2" id="headline2">taking too long.</div>

    <!-- Subtitle -->
    <div class="subtitle" id="subtitle">
      Lesson plans. Quizzes. Grading.<br>Done in seconds.
    </div>

    <!-- Progress Bar -->
    <div class="progress-container">
      <div class="progress" id="progress"></div>
    </div>

  </div>

  <script>
    const pill = document.getElementById('pill');
    const headline1 = document.getElementById('headline1');
    const headline2 = document.getElementById('headline2');
    const subtitle = document.getElementById('subtitle');
    const progress = document.getElementById('progress');

    // Start the 30-second progress bar
    function startProgress() {
      progress.style.width = '100%';
    }

    // Timeline matching your AE script (approximate seconds)
    function playAnimation() {
      // Pill appears ~0.1s
      setTimeout(() => {
        pill.classList.add('animate-in');
      }, 100);

      // Headline 1 ~0.3s
      setTimeout(() => {
        headline1.style.opacity = '1';
        headline1.classList.add('slide-up');
      }, 300);

      // Headline 2 ~0.55s
      setTimeout(() => {
        headline2.style.opacity = '1';
        headline2.classList.add('slide-up');
      }, 550);

      // Subtitle ~0.85s
      setTimeout(() => {
        subtitle.style.opacity = '1';
        subtitle.classList.add('slide-up');
      }, 850);

      // Start progress immediately
      startProgress();
    }

    // Auto-play when page loads
    window.onload = () => {
      playAnimation();
      
      // Optional: Click anywhere to restart (helpful while recording)
      document.getElementById('videoContainer').addEventListener('click', () => {
        location.reload();
      });
    };

    // Keyboard shortcut: Press "R" to restart animation (useful for recording takes)
    document.addEventListener('keydown', (e) => {
      if (e.key.toLowerCase() === 'r') {
        location.reload();
      }
    });
  </script>

</body>
</html>
